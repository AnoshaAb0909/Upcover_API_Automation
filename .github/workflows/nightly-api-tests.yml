name: Nightly API Tests

on:
  schedule:
    # 6:00 AM AEST (UTC+10) = 20:00 UTC the previous calendar day
    - cron: '0 20 * * *'
  workflow_dispatch:

jobs:
  api-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run API tests
        id: tests
        continue-on-error: true
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          GUEST_EMAIL: ${{ secrets.GUEST_EMAIL }}
          REQUEST_TIMEOUT: 120000
          COALITION_PAYMENT_METHOD_ID: ${{ secrets.COALITION_PAYMENT_METHOD_ID }}
          COALITION_MONTHLY_PAYMENT_METHOD_ID: ${{ secrets.COALITION_MONTHLY_PAYMENT_METHOD_ID }}
          VIZ_PAYMENT_METHOD_ID: ${{ secrets.VIZ_PAYMENT_METHOD_ID }}
          VIZ_MONTHLY_PAYMENT_METHOD_ID: ${{ secrets.VIZ_MONTHLY_PAYMENT_METHOD_ID }}
        run: npm test

      - name: Upload HTML report
        if: always() && hashFiles('reports/test-report.html') != ''
        uses: actions/upload-artifact@v4
        with:
          name: test-report-${{ github.run_id }}
          path: reports/test-report.html
          retention-days: 14

      - name: Notify Slack
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          TEST_OUTCOME: ${{ steps.tests.outcome }}
          HAS_REPORT: ${{ hashFiles('reports/test-report.html') != '' }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL secret is not set — skipping Slack notification."
            exit 0
          fi

          case "$TEST_OUTCOME" in
            success) STATUS="PASSED ✅"; COLOR="#36a64f" ;;
            failure) STATUS="FAILED ❌";  COLOR="#e01e5a" ;;
            *)       STATUS="UNKNOWN ⚠️"; COLOR="#ecb22e" ;;
          esac

          if [ "$HAS_REPORT" = "true" ]; then
            REPORT_NOTE="Download the HTML report from the *Artifacts* section on the run page."
          else
            REPORT_NOTE="No HTML report was generated for this run."
          fi

          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          TRIGGER="${{ github.event_name }}"

          curl -sf -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-type: application/json' \
            --data "{
              \"attachments\": [{
                \"color\": \"$COLOR\",
                \"blocks\": [
                  {
                    \"type\": \"header\",
                    \"text\": {
                      \"type\": \"plain_text\",
                      \"text\": \"Upcover API Test Report\"
                    }
                  },
                  {
                    \"type\": \"section\",
                    \"fields\": [
                      { \"type\": \"mrkdwn\", \"text\": \"*Result:*\\n$STATUS\" },
                      { \"type\": \"mrkdwn\", \"text\": \"*Run:*\\n#${{ github.run_number }}\" },
                      { \"type\": \"mrkdwn\", \"text\": \"*Trigger:*\\n$TRIGGER\" },
                      { \"type\": \"mrkdwn\", \"text\": \"*Branch:*\\n${{ github.ref_name }}\" }
                    ]
                  },
                  {
                    \"type\": \"section\",
                    \"text\": {
                      \"type\": \"mrkdwn\",
                      \"text\": \"<$RUN_URL|View run on GitHub Actions>\\n$REPORT_NOTE\"
                    }
                  }
                ]
              }]
            }"

      - name: Fail job if tests failed
        if: steps.tests.outcome == 'failure'
        run: exit 1
