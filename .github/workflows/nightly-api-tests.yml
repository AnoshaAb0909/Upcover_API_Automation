name: Nightly API Tests

on:
  schedule:
    # 6:00 AM AEST (UTC+10) = 20:00 UTC the previous calendar day
    - cron: '0 20 * * *'
  workflow_dispatch:

jobs:
  api-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run API tests
        id: tests
        continue-on-error: true
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          GUEST_EMAIL: ${{ secrets.GUEST_EMAIL }}
          REQUEST_TIMEOUT: 120000
          STRIPE_SECRET_KEY_ANNUAL: ${{ secrets.STRIPE_SECRET_KEY_ANNUAL }}
          STRIPE_SECRET_KEY_MONTHLY: ${{ secrets.STRIPE_SECRET_KEY_MONTHLY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          FALLBACK_ANNUAL_PAYMENT_METHOD_ID: ${{ secrets.FALLBACK_ANNUAL_PAYMENT_METHOD_ID }}
          FALLBACK_MONTHLY_PAYMENT_METHOD_ID: ${{ secrets.FALLBACK_MONTHLY_PAYMENT_METHOD_ID }}
          VIZ_QUICK_QUOTE_PATH: /viz/quick-quote
          VIZ_FULL_QUOTE_PATH: /viz/full-quote
          VIZ_PAYMENTS_PATH: /viz/payments
          VIZ_MONTHLY_PAYMENTS_PATH: /viz/payments/monthly
          VIZ_ENDORSEMENT_PATH: /viz/full-quote/endorsement
          VIZ_ENDORSEMENT_PAYMENTS_PATH: /viz/payments/endorsement
          VIZ_ENDORSEMENT_MONTHLY_PAYMENTS_PATH: /viz/payments/endorsement/monthly
          VIZ_QUOTE_DOCS_EMAIL_PATH: /viz/quote-docs/email
          VIZ_PROOF_OF_INSURANCE_EMAIL_PATH: /viz/proof-of-insurance/email
        # Coalition excluded until dev env issues are resolved — Viz only
        run: npm run test:ci -- --json --outputFile=reports/test-results.json

      - name: Upload HTML report
        if: always() && hashFiles('reports/test-report.html') != ''
        uses: actions/upload-artifact@v4
        with:
          name: test-report-${{ github.run_id }}
          path: reports/test-report.html
          retention-days: 14

      - name: Notify Slack
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          TEST_OUTCOME: ${{ steps.tests.outcome }}
          HAS_REPORT: ${{ hashFiles('reports/test-report.html') != '' }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL secret is not set — skipping Slack notification."
            exit 0
          fi

          case "$TEST_OUTCOME" in
            success) COLOR="#36a64f" ;;
            failure) COLOR="#e01e5a" ;;
            *)       COLOR="#ecb22e" ;;
          esac

          if [ -f reports/test-results.json ]; then
            PASSED=$(jq -r '.numPassedTests // 0' reports/test-results.json)
            FAILED=$(jq -r '.numFailedTests // 0' reports/test-results.json)
            TOTAL=$(jq -r '.numTotalTests // 0' reports/test-results.json)
            STATUS="${PASSED} passed · ${FAILED} failed (${TOTAL} total)"
            PRODUCT_SUMMARY=$(jq -r '
              def product_from_path($path):
                if ($path | test("/products/coalition/")) then "Coalition"
                elif ($path | test("/products/viz/")) then "Viz"
                elif ($path | test("/products/ahp/")) then "AHP"
                elif ($path | test("/products/ppl/")) then "PPL"
                elif ($path | test("/products/cyber/")) then "Cyber"
                elif ($path | test("/auth/")) then "Auth"
                else "Other"
                end;

              [.testResults[] |
                .name as $path |
                product_from_path($path) as $product |
                .assertionResults[] | {product: $product, status: .status}
              ] | group_by(.product) | sort_by(.[0].product) | map(
                .[0].product as $product |
                (map(select(.status == "passed")) | length) as $passed |
                (map(select(.status == "failed")) | length) as $failed |
                "*\($product):* \($passed) passed · \($failed) failed"
              ) | join("\n")
            ' reports/test-results.json)
            PRODUCT_SUMMARY="${PRODUCT_SUMMARY}"$'\n'"*Coalition:* skipped (dev env issue)"
            if [ "$FAILED" -gt 0 ]; then
              COLOR="#e01e5a"
            elif [ "$TOTAL" -gt 0 ]; then
              COLOR="#36a64f"
            fi
          else
            PASSED="?"
            FAILED="?"
            TOTAL="?"
            STATUS="Test results unavailable"
            PRODUCT_SUMMARY="Product breakdown unavailable"
          fi

          if [ "$HAS_REPORT" = "true" ]; then
            REPORT_NOTE="Download the HTML report from the *Artifacts* section on the run page."
          else
            REPORT_NOTE="No HTML report was generated for this run."
          fi

          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          TRIGGER="${{ github.event_name }}"

          jq -n \
            --arg color "$COLOR" \
            --arg status "$STATUS" \
            --arg product_summary "$PRODUCT_SUMMARY" \
            --arg run_number "${{ github.run_number }}" \
            --arg trigger "$TRIGGER" \
            --arg branch "${{ github.ref_name }}" \
            --arg run_url "$RUN_URL" \
            --arg report_note "$REPORT_NOTE" \
            '{
              attachments: [{
                color: $color,
                blocks: [
                  {
                    type: "header",
                    text: { type: "plain_text", text: "Upcover API Test Report" }
                  },
                  {
                    type: "section",
                    fields: [
                      { type: "mrkdwn", text: ("*Result:*\n" + $status) },
                      { type: "mrkdwn", text: ("*Run:*\n#" + $run_number) }
                    ]
                  },
                  {
                    type: "section",
                    text: { type: "mrkdwn", text: $product_summary }
                  },
                  {
                    type: "section",
                    fields: [
                      { type: "mrkdwn", text: ("*Trigger:*\n" + $trigger) },
                      { type: "mrkdwn", text: ("*Branch:*\n" + $branch) }
                    ]
                  },
                  {
                    type: "section",
                    text: {
                      type: "mrkdwn",
                      text: ("<" + $run_url + "|View run on GitHub Actions>\n" + $report_note)
                    }
                  }
                ]
              }]
            }' | curl -sf -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-type: application/json' \
            --data @-
